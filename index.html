<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keshav Chabi Workshop</title>

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-E7ME50B4D3"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-E7ME50B4D3');
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #2d50ed;
            --whatsapp: #25D366;
            --insta: #E1306C;
            --yt: #FF0000;
            --google: #4285F4;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #f4f7f6; overflow-x: hidden; }

        #preloader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }
        #preloader video {
            width: 80%;
            max-width: 300px;
            border-radius: 20px;
        }

        .marquee {
            width: 100%;
            background: #000;
            color: #fff;
            padding: 8px 0;
            position: fixed;
            top: 0; z-index: 100;
            font-size: 12px;
            font-weight: 600;
            overflow: hidden;
        }
        .marquee-inner {
            display: inline-block;
            white-space: nowrap;
            animation: scroll 15s linear infinite;
        }
        @keyframes scroll {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        .main-container {
            width: 90%;
            max-width: 420px;
            background: #fff;
            margin: 70px auto 120px;
            border-radius: 30px;
            padding: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
        }

        .workshop-logo {
            width: 110px; height: 110px;
            border-radius: 50%;
            border: 4px solid var(--primary);
            margin-bottom: 10px;
        }

        .slider {
            width: 100%; height: 210px;
            border-radius: 20px;
            overflow: hidden;
            margin: 20px 0;
            position: relative;
        }
        .slides {
            display: flex; width: 300%; height: 100%;
            transition: 0.8s ease-in-out;
        }
        .slides img { width: 33.33%; object-fit: cover; }

        .btn-catalogue {
            background: var(--primary);
            color: white;
            text-decoration: none;
            padding: 14px;
            display: block;
            border-radius: 12px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .social-row {
            display: flex; align-items: center;
            background: #f9f9f9;
            padding: 15px; margin-bottom: 10px;
            border-radius: 15px;
            text-decoration: none; color: #333;
            font-weight: 500;
            transition: 0.3s;
            border: 1px solid #eee;
        }
        .social-row:hover { transform: translateY(-2px); border-color: var(--primary); }
        .social-row i { font-size: 22px; width: 40px; }
        .arrow { margin-left: auto; font-size: 12px; color: #bbb; }

        .save-btn {
            background: #222; color: #fff; border: none;
            width: 100%; padding: 15px; border-radius: 15px;
            font-weight: 600; cursor: pointer; margin-top: 10px;
        }

        .floating-stack {
            position: fixed;
            bottom: 25px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 1000;
        }
        .float-btn {
            width: 55px; height: 55px;
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            color: #fff; font-size: 26px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            text-decoration: none;
        }
        .f-call { background: var(--primary); }
        .f-wa { background: var(--whatsapp); }

    </style>
</head>
<body>
